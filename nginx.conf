application live {
    live on;
    record off;

    exec_push ffmpeg -i rtmp://localhost/live/$name \
    -map 0:v -map 0:a \
    -c:v libx264 -preset veryfast -b:v 1500k \
    -c:a aac -b:a 128k -ar 44100 -ac 2 \
    -f flv rtmp://localhost/hls/$name;

    hls on;
    hls_path /tmp/hls;
    hls_fragment 3;
    hls_playlist_length 60;
}